name: x86_64 kernel validation

on:
  push:
  pull_request:

jobs:
  x86_64-build-and-qemu-scenarios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source tree
        uses: actions/checkout@v4

      - name: Install x86_64 kernel build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            qemu-system-x86 \
            ovmf

      - name: Validate x86_64 kernel build and boot scenarios
        run: ./scripts/check.sh
